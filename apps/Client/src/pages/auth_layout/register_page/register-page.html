<div class="root">
  <app-title-page [title]="'Register'" />

  <form [formGroup]="form" (ngSubmit)="handleSubmit()" class="root__form">
    <app-txt-input
      [ctrl]="getCtrl(RegisterUiFct.firstName.name)"
      [field]="RegisterUiFct.firstName"
    />
    <app-txt-input [ctrl]="getCtrl(RegisterUiFct.lastName.name)" [field]="RegisterUiFct.lastName" />
    <app-txt-input [ctrl]="getCtrl(RegisterUiFct.email.name)" [field]="RegisterUiFct.email" />
    <app-pwd-input [ctrl]="getCtrl(RegisterUiFct.password.name)" [field]="RegisterUiFct.password" />

    <button class="form__btn" type="submit">Submit</button>
  </form>
</div>
