<div class="root">
  <app-title-page [title]="'Login'" />

  <form [formGroup]="form" (ngSubmit)="handleSubmit()" class="root__form">
    <app-txt-input [ctrl]="getCtrl(LoginUiFct.email.name)" [field]="LoginUiFct.email" />
    <app-pwd-input [ctrl]="getCtrl(LoginUiFct.password.name)" [field]="LoginUiFct.password" />

    <button class="form__btn" type="submit">
      {{ apiTracker.isPending() ? 'Pending...' : 'Submit' }}
    </button>
  </form>
</div>
